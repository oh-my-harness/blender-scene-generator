<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧊</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blender Scene Generator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f1a;
            --bg-2: #141424;
            --grad-start: #6366f1;
            --grad-end: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text: #e5e7eb;
            --text-dim: #9ca3af;
            --text-muted: #6b7280;
            --glass-bg: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
            --glass-bg-hover: rgba(255,255,255,0.08);
            --radius-card: 12px;
            --radius-btn: 8px;
            --radius-sm: 6px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Subtle ambient gradient */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 20%, rgba(99,102,241,0.08), transparent 50%),
                radial-gradient(ellipse at 85% 80%, rgba(139,92,246,0.08), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== Top Status Bar ===== */
        #topbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 24px;
            background: rgba(15,15,26,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
            flex-shrink: 0;
        }
        #topbar .logo {
            font-size: 20px;
            font-weight: 700;
            white-space: nowrap;
            background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #description {
            flex: 1;
            min-width: 0;
            height: 42px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-btn);
            padding: 10px 14px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: border-color 0.2s;
        }
        #description:focus {
            outline: none;
            border-color: var(--grad-start);
        }
        #description::placeholder { color: var(--text-muted); }

        #submit-btn {
            height: 42px;
            padding: 0 24px;
            background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
            color: #fff;
            border: none;
            border-radius: var(--radius-btn);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.1s;
        }
        #submit-btn:hover { opacity: 0.9; }
        #submit-btn:active { transform: scale(0.97); }
        #submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .skip-refine-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-dim);
            cursor: pointer;
            white-space: nowrap;
        }
        .skip-refine-label input { cursor: pointer; }

        .topbar-divider {
            width: 1px;
            height: 28px;
            background: var(--glass-border);
        }

        #current-step-display {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 600;
            min-width: 160px;
        }
        #current-step-icon { font-size: 20px; }
        #current-step-name { color: var(--text); }

        #cost-display {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 14px;
            color: var(--text-dim);
            min-width: 70px;
            text-align: right;
        }

        #status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(156,163,175,0.15);
            color: var(--text-dim);
            border: 1px solid rgba(156,163,175,0.2);
            transition: all 0.3s;
        }
        #status-badge.running {
            background: rgba(99,102,241,0.15);
            color: #a5b4fc;
            border-color: rgba(99,102,241,0.3);
        }
        #status-badge.running .badge-dot { animation: pulse-dot 1.5s infinite; }
        #status-badge.paused {
            background: rgba(245,158,11,0.15);
            color: #fcd34d;
            border-color: rgba(245,158,11,0.3);
        }
        #status-badge.done {
            background: rgba(16,185,129,0.15);
            color: #6ee7b7;
            border-color: rgba(16,185,129,0.3);
        }
        #status-badge.failed {
            background: rgba(239,68,68,0.15);
            color: #fca5a5;
            border-color: rgba(239,68,68,0.3);
        }
        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
            50% { opacity: 0.6; box-shadow: 0 0 0 4px transparent; }
        }

        /* ===== Main 3-column layout ===== */
        #main {
            display: flex;
            flex: 1;
            min-height: 0;
            position: relative;
            z-index: 1;
        }

        /* ===== Left Column — Flowchart ===== */
        #left-col {
            width: 280px;
            flex-shrink: 0;
            padding: 20px 16px;
            overflow-y: auto;
            border-right: 1px solid var(--glass-border);
        }
        #left-col::-webkit-scrollbar { width: 4px; }
        #left-col::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .flow-node {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            margin-bottom: 2px;
            border-radius: var(--radius-card);
            border: 1px solid transparent;
            transition: all 0.3s;
            position: relative;
        }
        .flow-node-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }
        .flow-node-info {
            flex: 1;
            min-width: 0;
        }
        .flow-node-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            transition: color 0.3s;
        }
        .flow-node-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
        }
        .flow-node-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(156,163,175,0.3);
            flex-shrink: 0;
            transition: all 0.3s;
        }
        /* Connector line between nodes */
        .flow-node:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 25px;
            bottom: -10px;
            width: 2px;
            height: 8px;
            background: rgba(255,255,255,0.08);
        }

        .flow-node.pending .flow-node-dot {
            background: rgba(156,163,175,0.3);
        }
        .flow-node.active {
            background: var(--glass-bg);
            border-color: rgba(99,102,241,0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .flow-node.active .flow-node-name { color: #a5b4fc; }
        .flow-node.active .flow-node-dot {
            background: var(--grad-start);
            animation: pulse-glow 1.5s infinite;
        }
        .flow-node.done .flow-node-name { color: var(--text); }
        .flow-node.done .flow-node-dot {
            background: var(--success);
        }
        .flow-node.done .flow-node-dot::after {
            content: '✓';
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 12px;
            line-height: 12px;
        }
        .flow-node.failed .flow-node-dot {
            background: var(--error);
        }
        .flow-node.failed .flow-node-dot::after {
            content: '✗';
            color: #fff;
            font-size: 8px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 12px;
            line-height: 12px;
        }
        .flow-node.failed .flow-node-name { color: #fca5a5; }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.6); }
            50% { box-shadow: 0 0 0 6px rgba(99,102,241,0); }
        }

        /* Round badge for repeated steps */
        .flow-node-round {
            font-size: 10px;
            font-weight: 700;
            color: var(--grad-end);
            background: rgba(139,92,246,0.15);
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: auto;
        }

        /* ===== Center Column — Main Content ===== */
        #center-col {
            flex: 1;
            min-width: 0;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        #center-col::-webkit-scrollbar { width: 6px; }
        #center-col::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 6px; }

        .center-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: var(--text-muted);
            text-align: center;
            gap: 12px;
        }
        .center-empty .big-icon { font-size: 48px; opacity: 0.5; }
        .center-empty .hint { font-size: 16px; }

        /* Step header */
        .step-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .step-header-icon { font-size: 28px; }
        .step-header-text h2 {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
        }
        .step-header-text .step-desc {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* Glass card base */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-card);
            padding: 16px;
        }

        /* LLM thinking output */
        .llm-output {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
        }
        .llm-output::-webkit-scrollbar { width: 4px; }
        .llm-output::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .llm-output-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .llm-output-label .thinking-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--grad-start);
            animation: pulse-dot 1s infinite;
        }

        /* Tool call cards */
        .tool-cards-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .tool-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tool-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tool-card-name {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 13px;
            color: #a5b4fc;
            font-weight: 600;
        }
        .tool-card-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: auto;
            flex-shrink: 0;
        }
        .tool-card-status-dot.executing {
            background: var(--grad-start);
            animation: pulse-dot 1s infinite;
        }
        .tool-card-status-dot.ok { background: var(--success); }
        .tool-card-status-dot.err { background: var(--error); }
        .tool-card-args {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tool-card-result {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .tool-card-result.err { color: #fca5a5; }

        /* Review / pause cards */
        .review-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-card);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .review-card-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .review-card-content {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text);
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-sm);
            padding: 16px;
            white-space: pre-wrap;
            max-height: 350px;
            overflow-y: auto;
        }
        .review-card-content::-webkit-scrollbar { width: 4px; }
        .review-card-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .review-feedback {
            width: 100%;
            min-height: 60px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }
        .review-feedback:focus { outline: none; border-color: var(--grad-start); }
        .review-feedback::placeholder { color: var(--text-muted); }

        .review-buttons {
            display: flex;
            gap: 12px;
        }
        .btn-approve {
            flex: 1;
            height: 44px;
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            border: none;
            border-radius: var(--radius-btn);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-approve:hover { opacity: 0.9; }
        .btn-approve:active { transform: scale(0.97); }
        .btn-reject {
            flex: 1;
            height: 44px;
            background: linear-gradient(135deg, var(--error), #dc2626);
            color: #fff;
            border: none;
            border-radius: var(--radius-btn);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-reject:hover { opacity: 0.9; }
        .btn-reject:active { transform: scale(0.97); }
        .btn-approve:disabled, .btn-reject:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Renderer spinner */
        .render-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 60px 20px;
        }
        .render-spinner .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(99,102,241,0.2);
            border-top-color: var(--grad-start);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .render-spinner .label { font-size: 18px; color: var(--text-dim); }

        /* Render image */
        .render-result {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .render-result img {
            max-width: 100%;
            border-radius: var(--radius-card);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* Adjust section */
        .adjust-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-card);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .adjust-card-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .adjust-input {
            width: 100%;
            min-height: 80px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }
        .adjust-input:focus { outline: none; border-color: var(--grad-start); }
        .adjust-input::placeholder { color: var(--text-muted); }
        .btn-apply {
            align-self: flex-end;
            height: 42px;
            padding: 0 24px;
            background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
            color: #fff;
            border: none;
            border-radius: var(--radius-btn);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-apply:hover { opacity: 0.9; }
        .btn-apply:active { transform: scale(0.97); }
        .btn-apply:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ===== Right Column — Event Timeline ===== */
        #right-col {
            width: 320px;
            flex-shrink: 0;
            padding: 20px 16px;
            overflow-y: auto;
            border-left: 1px solid var(--glass-border);
        }
        #right-col::-webkit-scrollbar { width: 4px; }
        #right-col::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .right-header {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        #events {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        #events li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            transition: background 0.2s;
        }
        #events li:hover { background: rgba(255,255,255,0.03); }
        .event-icon {
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .event-body {
            flex: 1;
            min-width: 0;
        }
        .event-text {
            color: var(--text);
            word-break: break-word;
        }
        .event-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            font-family: "SF Mono", "Fira Code", monospace;
        }
        .event-output-preview {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
            padding: 6px 8px;
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-sm);
            white-space: pre-wrap;
            max-height: 80px;
            overflow-y: auto;
            font-family: "SF Mono", "Fira Code", monospace;
        }
        .event-output-preview::-webkit-scrollbar { width: 3px; }
        .event-output-preview::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .event-step_started .event-icon { color: #a5b4fc; }
        .event-step_started .event-text { color: #a5b4fc; }
        .event-step_finished .event-icon { color: var(--success); }
        .event-step_finished .event-text { color: #6ee7b7; }
        .event-paused .event-icon { color: var(--warning); }
        .event-paused .event-text { color: #fcd34d; }
        .event-resumed .event-icon { color: var(--success); }
        .event-resumed .event-text { color: #6ee7b7; }
        .event-failed .event-icon { color: var(--error); }
        .event-failed .event-text { color: #fca5a5; }
        .event-cancelled .event-icon { color: var(--error); }
        .event-cancelled .event-text { color: #fca5a5; }

        .event-ts {
            font-size: 11px;
            color: var(--text-muted);
            font-family: "SF Mono", "Fira Code", monospace;
            white-space: nowrap;
        }

        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Top Status Bar -->
    <div id="topbar">
        <span class="logo">🧊 Scene Gen</span>
        <textarea id="description" placeholder="Describe a scene... e.g. A cozy Nordic living room with a white sofa, wooden coffee table, and warm lamp lighting"></textarea>
        <label class="skip-refine-label"><input type="checkbox" id="skip-refine"> 细化</label>
        <button id="submit-btn" onclick="submitTask()">Generate</button>
        <div class="topbar-divider"></div>
        <div id="current-step-display">
            <span id="current-step-icon">⚪</span>
            <span id="current-step-name">Idle</span>
        </div>
        <div class="topbar-divider"></div>
        <span id="cost-display">$0.000</span>
        <div id="status-badge"><span class="badge-dot"></span>Idle</div>
    </div>

    <!-- Main 3-column layout -->
    <div id="main">
        <!-- Left: Flowchart -->
        <div id="left-col"></div>

        <!-- Center: Context-switching content -->
        <div id="center-col">
            <div class="center-empty" id="center-empty">
                <div class="big-icon">🎨</div>
                <div class="hint">Enter a scene description and click Generate</div>
            </div>
        </div>

        <!-- Right: Event Timeline -->
        <div id="right-col">
            <div class="right-header">Event Timeline</div>
            <ul id="events"></ul>
        </div>
    </div>

    <script>
        let ws = null;
        // Monotonic counter so repeated step executions (e.g. builder on
        // adjust rounds or batch loops) get unique card ids.
        let stepRound = 0;
        // Map stepId → latest card id suffix, so updateStepCard and
        // appendStepProgress target the most recent card for that step.
        const latestCardId = {};
        // Map stepId → round count (for left-column round badges)
        const stepRounds = {};
        // Track current active step
        let currentStepId = null;
        // Track total cost
        let totalCost = 0;
        // Store step outputs for review cards
        const stepOutputs = {};
        // Store step structured outputs
        const stepStructured = {};

        const stepConfig = {
            scene_refiner:      { name: 'Scene Refiner',      icon: '✨', desc: '细化场景描述' },
            scene_review:       { name: 'Scene Review',       icon: '👁️', desc: '人工审批细化结果' },
            scene_analyst:      { name: 'Scene Analyst',      icon: '🔍', desc: '分析场景描述' },
            object_planner:     { name: 'Object Planner',     icon: '📦', desc: '规划物体清单' },
            builder:            { name: 'Builder',            icon: '🔨', desc: '构建 3D 场景' },
            lighting_planner:   { name: 'Lighting Planner',   icon: '💡', desc: '规划灯光与相机' },
            material_artist:    { name: 'Material Artist',    icon: '🎨', desc: '添加材质' },
            lighting_designer:  { name: 'Lighting Designer',  icon: '🌟', desc: '布置灯光' },
            reviewer:           { name: 'Reviewer',           icon: '✅', desc: '审阅场景质量' },
            renderer:           { name: 'Renderer',           icon: '📸', desc: '渲染场景' },
            wait_for_adjust:    { name: 'Wait',               icon: '⏸️', desc: '等待调整指令' },
        };
        const stepOrder = ['scene_refiner', 'scene_review', 'scene_analyst', 'object_planner', 'builder',
                           'lighting_planner', 'material_artist', 'lighting_designer', 'reviewer', 'renderer', 'wait_for_adjust'];

        // ===== Init: build left column flowchart =====
        function buildFlowchart() {
            const container = document.getElementById('left-col');
            container.innerHTML = '';
            stepOrder.forEach(id => {
                const cfg = stepConfig[id];
                const node = document.createElement('div');
                node.className = 'flow-node pending';
                node.id = 'node-' + id;
                node.innerHTML = `
                    <span class="flow-node-icon">${cfg.icon}</span>
                    <div class="flow-node-info">
                        <div class="flow-node-name">${cfg.name}</div>
                        <div class="flow-node-desc">${cfg.desc}</div>
                    </div>
                    <span class="flow-node-dot"></span>
                `;
                container.appendChild(node);
            });
        }
        buildFlowchart();

        // ===== Task submission =====
        function submitTask() {
            const desc = document.getElementById('description').value.trim();
            if (!desc) return;

            document.getElementById('submit-btn').disabled = true;

            fetch('/api/task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: desc, skip_refine: !document.getElementById('skip-refine').checked }),
            }).then(resp => {
                if (resp.status === 409) {
                    alert('已有任务在运行，请等待完成。');
                    document.getElementById('submit-btn').disabled = false;
                    // Restore UI from server state instead of leaving it blank
                    restoreFromStatus();
                } else if (resp.ok) {
                    // Clear UI for the new task, then sync state from server.
                    // restoreFromStatus polls /api/status (with retries) until the
                    // engine registers the task, then connects WS for live events.
                    document.getElementById('events').innerHTML = '';
                    resetFlowchart();
                    resetState();
                    restoreFromStatus();
                } else {
                    alert('Failed to start task');
                    document.getElementById('submit-btn').disabled = false;
                }
            });
        }

        function connectWS() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            ws = new WebSocket('ws://' + location.host + '/ws');
            ws.onmessage = (ev) => {
                const event = JSON.parse(ev.data);
                handleEvent(event);
            };
            ws.onclose = () => {
                // Re-enable submit unless we're in wait_for_adjust
                if (currentStepId !== 'wait_for_adjust') {
                    document.getElementById('submit-btn').disabled = false;
                }
            };
        }

        // ===== Event handler =====
        function handleEvent(event) {
            const type = event.type;

            if (type === 'step_progress') {
                // High-frequency — update center column only, don't add to event list
                handleStepProgress(event);
                return;
            }

            const list = document.getElementById('events');
            const li = document.createElement('li');
            const ts = new Date().toLocaleTimeString();

            if (type === 'step_started') {
                const stepId = event.step_id;
                const cfg = stepConfig[stepId] || { name: event.step_name || stepId, icon: '🔹', desc: '' };
                const stepName = cfg.name;

                // Track rounds for repeated steps
                stepRounds[stepId] = (stepRounds[stepId] || 0) + 1;
                currentStepId = stepId;

                li.innerHTML = `
                    <span class="event-icon">▶</span>
                    <div class="event-body">
                        <span class="event-text">${stepName} started</span>
                        ${stepRounds[stepId] > 1 ? `<div class="event-meta">round ${stepRounds[stepId]}</div>` : ''}
                    </div>
                    <span class="event-ts">${ts}</span>
                `;
                li.className = 'event-step_started';

                setActiveNode(stepId);
                updateTopbarStep(stepId);

                // scene_review and wait_for_adjust are executor steps that block on a queue.
                // The engine reports them as 'running', but they're effectively paused.
                // Show the appropriate UI immediately instead of waiting for a 'paused' event.
                if (stepId === 'scene_review') {
                    setStatusBadge('paused', 'Paused');
                    showReviewCard('scene_review');
                } else if (stepId === 'wait_for_adjust') {
                    setStatusBadge('paused', 'Waiting');
                    showAdjustSection();
                } else {
                    setStatusBadge('running', 'Running');
                    initCenterForStep(stepId, stepRounds[stepId]);
                }
            } else if (type === 'step_finished') {
                const stepId = event.step_id;
                const cfg = stepConfig[stepId] || { name: stepId, icon: '🔹' };
                const stepName = cfg.name;
                const output = event.output || '';
                const toolCount = event.tool_calls_count || 0;
                const cost = event.cost;
                const structured = event.structured;

                // Store output for review cards
                if (output) stepOutputs[stepId] = output;
                if (structured) stepStructured[stepId] = structured;

                // Accumulate cost
                if (cost && cost.total_cost) {
                    totalCost += cost.total_cost;
                } else if (cost && cost.input_tokens && cost.output_tokens) {
                    // Estimate if total_cost not provided
                    totalCost += (cost.input_tokens * 0.01 + cost.output_tokens * 0.03) / 1000;
                }
                updateCostDisplay();

                let metaParts = [];
                if (toolCount > 0) metaParts.push(`${toolCount} tools`);
                if (cost && cost.input_tokens > 0) metaParts.push(`${cost.input_tokens}↓ ${cost.output_tokens}↑`);

                li.innerHTML = `
                    <span class="event-icon">✔</span>
                    <div class="event-body">
                        <span class="event-text">${stepName} finished</span>
                        ${metaParts.length ? `<div class="event-meta">${metaParts.join(' · ')}</div>` : ''}
                    </div>
                    <span class="event-ts">${ts}</span>
                `;
                li.className = 'event-step_finished';

                // Show output preview in timeline
                if (output && output.trim()) {
                    const preview = output.length > 200 ? output.slice(0, 200) + '...' : output;
                    const previewDiv = document.createElement('div');
                    previewDiv.className = 'event-output-preview';
                    previewDiv.textContent = preview;
                    li.querySelector('.event-body').appendChild(previewDiv);
                }

                setDoneNode(stepId);
                updateStepCardFinished(stepId, output, toolCount, cost, structured);

                // Handle renderer completion
                if (stepId === 'renderer') {
                    const imagePath = structured?.image_path;
                    if (imagePath) {
                        const filename = imagePath.split('/').pop();
                        loadRenderImage(filename);
                    }
                }
                if (stepId === 'wait_for_adjust') {
                    // Don't hide adjust — it stays visible with the render
                }
            } else if (type === 'paused') {
                const reason = event.reason || '';
                li.innerHTML = `
                    <span class="event-icon">⏸</span>
                    <div class="event-body">
                        <span class="event-text">Paused: ${reason}</span>
                    </div>
                    <span class="event-ts">${ts}</span>
                `;
                li.className = 'event-paused';
                setStatusBadge('paused', 'Paused');
                showReviewCard(reason);
            } else if (type === 'resumed') {
                li.innerHTML = `
                    <span class="event-icon">▶</span>
                    <div class="event-body">
                        <span class="event-text">Resumed</span>
                    </div>
                    <span class="event-ts">${ts}</span>
                `;
                li.className = 'event-resumed';
                setStatusBadge('running', 'Running');
                hideReviewCard();
            } else if (type === 'failed') {
                li.innerHTML = `
                    <span class="event-icon">✗</span>
                    <div class="event-body">
                        <span class="event-text">Failed: ${escapeHtml(event.error || '')}</span>
                    </div>
                    <span class="event-ts">${ts}</span>
                `;
                li.className = 'event-failed';
                if (currentStepId) setFailedNode(currentStepId);
                setStatusBadge('failed', 'Failed');
                document.getElementById('submit-btn').disabled = false;
            } else if (type === 'cancelled') {
                li.innerHTML = `
                    <span class="event-icon">✗</span>
                    <div class="event-body">
                        <span class="event-text">Cancelled: ${escapeHtml(event.reason || '')}</span>
                    </div>
                    <span class="event-ts">${ts}</span>
                `;
                li.className = 'event-cancelled';
                setStatusBadge('failed', 'Cancelled');
                document.getElementById('submit-btn').disabled = false;
            } else {
                li.innerHTML = `
                    <span class="event-icon">•</span>
                    <div class="event-body">
                        <span class="event-text">${escapeHtml(JSON.stringify(event))}</span>
                    </div>
                    <span class="event-ts">${ts}</span>
                `;
            }

            list.prepend(li);

            // Cap event list at 30
            while (list.children.length > 30) {
                list.removeChild(list.lastChild);
            }
        }

        // ===== Step progress (high-frequency, center column only) =====
        function handleStepProgress(event) {
            const stepId = event.step_id;
            const progress = event.progress;
            if (!progress) return;

            const type = progress.type;

            if (type === 'message_end') {
                // SDK's MessageEnd only carries message_id + kind (no text).
                // Show a thinking indicator so the user knows the AI produced text.
                const kind = (progress.kind || '').toLowerCase();
                if (kind.includes('progress')) {
                    appendLLMOutput(stepId, '💭 AI 正在思考...\n', 'progress');
                } else if (kind.includes('final')) {
                    appendLLMOutput(stepId, '✅ AI 回复完成\n', 'final');
                }
            } else if (type === 'turn_end') {
                // A turn completed — the AI may have produced text + tool calls.
                // The actual text comes in step_finished; just show a separator.
                appendLLMOutput(stepId, '---\n', 'progress');
            } else {
                // Tool call events — update tool cards
                appendToolProgress(stepId, progress);
            }
        }

        // ===== Center column management =====
        function showCenterEmpty() {
            const center = document.getElementById('center-col');
            center.innerHTML = `
                <div class="center-empty">
                    <div class="big-icon">🎨</div>
                    <div class="hint">Enter a scene description and click Generate</div>
                </div>
            `;
        }

        function initCenterForStep(stepId, round) {
            const center = document.getElementById('center-col');
            const cfg = stepConfig[stepId] || { name: stepId, icon: '🔹', desc: '' };

            // Don't reset center for wait_for_adjust — keep render visible + show adjust
            if (stepId === 'wait_for_adjust') {
                // If render image exists, keep it; add adjust section
                showAdjustSection();
                return;
            }

            // Don't reset for scene_review — it's an executor pause, handled by showReviewCard
            if (stepId === 'scene_review') {
                return;
            }

            // For renderer, show spinner (will be replaced by image on finish)
            if (stepId === 'renderer') {
                center.innerHTML = `
                    <div class="render-spinner">
                        <div class="spinner"></div>
                        <div class="label">Rendering...</div>
                    </div>
                `;
                return;
            }

            // For LLM steps — show step header + LLM output area + tool cards area
            const roundBadge = round > 1 ? ` <span style="font-size:14px;color:var(--grad-end);">×${round}</span>` : '';
            center.innerHTML = `
                <div class="step-header">
                    <span class="step-header-icon">${cfg.icon}</span>
                    <div class="step-header-text">
                        <h2>${cfg.name}${roundBadge}</h2>
                        <div class="step-desc">${cfg.desc}</div>
                    </div>
                </div>
                <div class="glass-card" id="llm-output-card">
                    <div class="llm-output-label">
                        <span class="thinking-dot"></span>
                        AI Thinking
                    </div>
                    <div class="llm-output" id="llm-output-${stepId}-${round}"></div>
                </div>
                <div class="tool-cards-container" id="tool-cards-${stepId}-${round}"></div>
            `;

            // Track the current round's container ids
            latestCardId[stepId] = `${stepId}-${round}`;
        }

        function appendLLMOutput(stepId, text, kind) {
            const cardId = latestCardId[stepId];
            if (!cardId) return;
            const outputDiv = document.getElementById(`llm-output-${cardId}`);
            if (!outputDiv) return;

            if (kind === 'progress') {
                // Intermediate — append with dim styling
                const span = document.createElement('span');
                span.style.color = 'var(--text-dim)';
                span.textContent = text;
                outputDiv.appendChild(span);
            } else {
                // Final answer — append with normal styling
                const span = document.createElement('span');
                span.textContent = text;
                outputDiv.appendChild(span);
            }
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        function appendToolProgress(stepId, progress) {
            const cardId = latestCardId[stepId];
            if (!cardId) return;
            const container = document.getElementById(`tool-cards-${cardId}`);
            if (!container) return;

            const type = progress.type;

            if (type === 'tool_call_start') {
                const card = document.createElement('div');
                card.className = 'tool-card';
                card.dataset.toolName = progress.name || '';
                card.innerHTML = `
                    <div class="tool-card-header">
                        <span class="tool-card-status-dot executing"></span>
                        <span class="tool-card-name">${escapeHtml(progress.name || 'tool')}</span>
                    </div>
                `;
                container.appendChild(card);

                // Keep max 8 cards
                while (container.children.length > 8) {
                    container.removeChild(container.firstChild);
                }
            } else if (type === 'tool_call_end') {
                const cards = container.querySelectorAll('.tool-card');
                if (cards.length === 0) return;
                const last = cards[cards.length - 1];
                const argsStr = progress.args ? JSON.stringify(progress.args).slice(0, 120) : '';
                const argsDiv = document.createElement('div');
                argsDiv.className = 'tool-card-args';
                argsDiv.textContent = argsStr;
                last.appendChild(argsDiv);
            } else if (type === 'tool_execution_start') {
                const cards = container.querySelectorAll('.tool-card');
                if (cards.length === 0) return;
                const last = cards[cards.length - 1];
                const dot = last.querySelector('.tool-card-status-dot');
                if (dot) dot.className = 'tool-card-status-dot executing';
            } else if (type === 'tool_execution_end') {
                const cards = container.querySelectorAll('.tool-card');
                if (cards.length === 0) return;
                const last = cards[cards.length - 1];
                const dot = last.querySelector('.tool-card-status-dot');
                if (progress.ok) {
                    if (dot) dot.className = 'tool-card-status-dot ok';
                    // Add result summary if available
                    const result = progress.result;
                    if (result) {
                        const resultStr = typeof result === 'string' ? result : JSON.stringify(result);
                        const resultDiv = document.createElement('div');
                        resultDiv.className = 'tool-card-result';
                        resultDiv.textContent = resultStr.slice(0, 120);
                        last.appendChild(resultDiv);
                    }
                } else {
                    if (dot) dot.className = 'tool-card-status-dot err';
                    const errDiv = document.createElement('div');
                    errDiv.className = 'tool-card-result err';
                    errDiv.textContent = progress.error || 'failed';
                    last.appendChild(errDiv);
                }
            }
        }

        function updateStepCardFinished(stepId, output, toolCount, cost, structured) {
            // For LLM steps, append the final output to the LLM area if not already there
            const cardId = latestCardId[stepId];
            if (!cardId) return;

            const outputDiv = document.getElementById(`llm-output-${cardId}`);
            if (outputDiv && output && output.trim()) {
                // If the output isn't already in the div, append it
                const currentText = outputDiv.textContent;
                if (!currentText.includes(output.slice(0, 100))) {
                    outputDiv.textContent = output;
                }
            }

            // Update the thinking dot to show completion
            const label = document.querySelector(`#llm-output-card .llm-output-label .thinking-dot`);
            if (label) {
                label.style.background = 'var(--success)';
                label.style.animation = 'none';
            }
        }

        // ===== Review cards (two pause types) =====
        function showReviewCard(reason) {
            const center = document.getElementById('center-col');
            const isSceneReview = (reason && reason.includes('scene')) || currentStepId === 'scene_review';

            if (isSceneReview) {
                // Scene Review — show refined description from scene_refiner output
                const refinedDesc = stepOutputs['scene_refiner'] || stepStructured['scene_refiner']?.refined_description || '(no description available)';
                center.innerHTML = `
                    <div class="review-card" id="review-card">
                        <div class="review-card-title">👁️ Scene Review</div>
                        <div style="color:var(--text-dim);font-size:14px;">Review the AI-refined scene description:</div>
                        <div class="review-card-content">${escapeHtml(refinedDesc)}</div>
                        <textarea class="review-feedback" id="scene-review-feedback" placeholder="Feedback (optional if approved)"></textarea>
                        <div class="review-buttons">
                            <button class="btn-reject" onclick="submitSceneReview(false)">✗ Reject</button>
                            <button class="btn-approve" onclick="submitSceneReview(true)">✓ Approve</button>
                        </div>
                    </div>
                `;
            } else {
                // Reviewer pause — show review summary from reviewer output
                const reviewSummary = stepOutputs['reviewer'] || '(no review summary available)';
                center.innerHTML = `
                    <div class="review-card" id="review-card">
                        <div class="review-card-title">✅ Quality Review</div>
                        <div style="color:var(--text-dim);font-size:14px;">Review the scene quality assessment:</div>
                        <div class="review-card-content">${escapeHtml(reviewSummary)}</div>
                        <textarea class="review-feedback" id="reviewer-feedback" placeholder="Feedback (optional if approved)"></textarea>
                        <div class="review-buttons">
                            <button class="btn-reject" onclick="submitReview(false)">✗ Reject</button>
                            <button class="btn-approve" onclick="submitReview(true)">✓ Approve</button>
                        </div>
                    </div>
                `;
            }
        }

        function hideReviewCard() {
            // Don't clear center — the next step_started will handle it
        }

        function submitSceneReview(approved) {
            const feedback = (document.getElementById('scene-review-feedback') || {}).value || '';
            fetch('/api/scene-review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ approved, feedback }),
            }).then(resp => {
                if (resp.status === 409) {
                    alert('No active scene review pause.');
                } else if (resp.ok) {
                    hideReviewCard();
                }
            });
        }

        function submitReview(passed) {
            const feedback = (document.getElementById('reviewer-feedback') || {}).value || '';
            fetch('/api/review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ passed, feedback }),
            }).then(resp => {
                if (resp.status === 409) {
                    alert('No active review pause.');
                } else if (resp.ok) {
                    hideReviewCard();
                }
            });
        }

        // ===== Render image =====
        function loadRenderImage(filename) {
            const center = document.getElementById('center-col');
            // Check if adjust section is already visible
            const adjustVisible = document.getElementById('adjust-card');

            let html = `
                <div class="render-result">
                    <img src="/api/render/${filename}?${Date.now()}" alt="Rendered scene" />
                </div>
            `;

            if (adjustVisible) {
                // Keep adjust section, prepend render
                const adjustHtml = adjustVisible.outerHTML;
                center.innerHTML = html + adjustHtml;
            } else {
                center.innerHTML = html;
            }
            document.getElementById('submit-btn').disabled = false;
            setStatusBadge('done', 'Done');
        }

        // ===== Adjust section =====
        function showAdjustSection() {
            const center = document.getElementById('center-col');
            // Check if render image is already shown
            const existingImg = center.querySelector('.render-result img');
            const renderHtml = existingImg ? `<div class="render-result">${existingImg.parentElement.innerHTML}</div>` : '';

            center.innerHTML = renderHtml + `
                <div class="adjust-card" id="adjust-card">
                    <div class="adjust-card-title">⏸️ Adjust Scene</div>
                    <div style="color:var(--text-dim);font-size:14px;">The scene is ready. Describe any adjustments:</div>
                    <textarea class="adjust-input" id="adjust-instruction" placeholder="e.g. Make the sofa red, add a lamp on the table"></textarea>
                    <button class="btn-apply" id="adjust-btn" onclick="submitAdjust()">Apply Adjustment</button>
                </div>
            `;
        }

        function submitAdjust() {
            const instruction = document.getElementById('adjust-instruction').value.trim();
            if (!instruction) return;

            document.getElementById('adjust-btn').disabled = true;

            fetch('/api/adjust', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instruction }),
            }).then(resp => {
                if (resp.status === 409) {
                    alert('No active scene. Generate a scene first.');
                    document.getElementById('adjust-btn').disabled = false;
                } else if (!resp.ok) {
                    alert('Failed to submit adjustment');
                    document.getElementById('adjust-btn').disabled = false;
                }
                // On success, events will flow as the builder runs.
            });
        }

        // ===== Flowchart node management =====
        function setActiveNode(stepId) {
            const node = document.getElementById('node-' + stepId);
            if (node) {
                node.classList.remove('pending', 'done', 'failed');
                node.classList.add('active');
            }
            // Show round badge if repeated
            if (stepRounds[stepId] > 1) {
                const info = node?.querySelector('.flow-node-info');
                const existing = info?.querySelector('.flow-node-round');
                if (!existing && info) {
                    const badge = document.createElement('span');
                    badge.className = 'flow-node-round';
                    badge.textContent = '×' + stepRounds[stepId];
                    info.appendChild(badge);
                } else if (existing) {
                    existing.textContent = '×' + stepRounds[stepId];
                }
            }
        }

        function setDoneNode(stepId) {
            const node = document.getElementById('node-' + stepId);
            if (node) {
                node.classList.remove('active', 'pending');
                node.classList.add('done');
            }
        }

        function setFailedNode(stepId) {
            const node = document.getElementById('node-' + stepId);
            if (node) {
                node.classList.remove('active', 'pending');
                node.classList.add('failed');
            }
        }

        function resetFlowchart() {
            stepOrder.forEach(id => {
                const node = document.getElementById('node-' + id);
                if (node) {
                    node.classList.remove('active', 'done', 'failed');
                    node.classList.add('pending');
                }
                // Remove round badges
                const badge = node?.querySelector('.flow-node-round');
                if (badge) badge.remove();
            });
        }

        function resetState() {
            stepRound = 0;
            Object.keys(stepRounds).forEach(k => delete stepRounds[k]);
            currentStepId = null;
            totalCost = 0;
            Object.keys(latestCardId).forEach(k => delete latestCardId[k]);
            Object.keys(stepOutputs).forEach(k => delete stepOutputs[k]);
            Object.keys(stepStructured).forEach(k => delete stepStructured[k]);
            updateCostDisplay();
            updateTopbarStep(null);
            setStatusBadge('', 'Idle');
        }

        // ===== Topbar updates =====
        function updateTopbarStep(stepId) {
            const iconEl = document.getElementById('current-step-icon');
            const nameEl = document.getElementById('current-step-name');
            if (!stepId) {
                iconEl.textContent = '⚪';
                nameEl.textContent = 'Idle';
            } else {
                const cfg = stepConfig[stepId] || { name: stepId, icon: '🔹' };
                iconEl.textContent = cfg.icon;
                nameEl.textContent = cfg.name;
            }
        }

        function updateCostDisplay() {
            document.getElementById('cost-display').textContent = '$' + totalCost.toFixed(3);
        }

        function setStatusBadge(cls, text) {
            const badge = document.getElementById('status-badge');
            badge.className = '';
            if (cls) badge.classList.add(cls);
            badge.innerHTML = `<span class="badge-dot"></span>${text}`;
        }

        // ===== Utility =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        // ===== Page load: restore state from /api/status =====
        function restoreFromStatus(retries = 0) {
            fetch('/api/status').then(resp => resp.json()).then(status => {
                const state = status.state;
                if (state === 'idle' || !status.running) {
                    // No active task yet. If this is right after submitting a task,
                    // the engine may not have registered it yet — retry a few times.
                    if (retries < 5) {
                        setTimeout(() => restoreFromStatus(retries + 1), 300);
                        return;
                    }
                    // Give up — no task running
                    showCenterEmpty();
                    return;
                }

                // Task is running or paused — restore UI state
                // Disable submit button
                document.getElementById('submit-btn').disabled = true;

                // Restore cost
                if (status.total_cost && status.total_cost.total_cost) {
                    totalCost = status.total_cost.total_cost;
                    updateCostDisplay();
                }

                // Restore step history → mark done nodes + populate outputs
                const history = status.step_history || [];
                history.forEach(record => {
                    const stepId = record.step_id;
                    if (!stepId) return;

                    // Track rounds
                    stepRounds[stepId] = (stepRounds[stepId] || 0) + 1;

                    // Mark node as done
                    setDoneNode(stepId);

                    // Add to event timeline
                    const list = document.getElementById('events');
                    const li = document.createElement('li');
                    const cfg = stepConfig[stepId] || { name: stepId, icon: '🔹' };
                    li.innerHTML = `
                        <span class="event-icon">✔</span>
                        <div class="event-body">
                            <span class="event-text">${cfg.name} finished</span>
                        </div>
                    `;
                    li.className = 'event-step_finished';
                    list.prepend(li);

                    // Store outputs for review cards
                    const result = record.result || {};
                    if (result.output) stepOutputs[stepId] = result.output;
                    if (result.structured) stepStructured[stepId] = result.structured;
                });

                // Restore current step
                const currentStep = status.current_step;
                if (currentStep) {
                    currentStepId = currentStep;
                    // Track round for current step (it's running, not yet in history)
                    stepRounds[currentStep] = (stepRounds[currentStep] || 0) + 1;
                    setActiveNode(currentStep);
                    updateTopbarStep(currentStep);

                    if (state === 'paused') {
                        setStatusBadge('paused', 'Paused');
                        // Show appropriate review card
                        if (currentStep === 'scene_review') {
                            showReviewCard('scene_review');
                        } else {
                            showReviewCard('reviewer');
                        }
                    } else if (currentStep === 'scene_review') {
                        // scene_review executor blocks on a queue — engine reports 'running'
                        // but it's effectively paused waiting for human approval.
                        setStatusBadge('paused', 'Paused');
                        showReviewCard('scene_review');
                    } else if (currentStep === 'wait_for_adjust') {
                        // wait_for_adjust executor also blocks on a queue.
                        setStatusBadge('paused', 'Waiting');
                        showAdjustSection();
                    } else {
                        setStatusBadge('running', 'Running');
                        initCenterForStep(currentStep, stepRounds[currentStep]);
                    }
                }

                // Connect WebSocket to receive live events
                connectWS();
            }).catch(err => {
                console.error('Failed to restore status:', err);
                showCenterEmpty();
            });
        }

        // Run on page load
        restoreFromStatus();
     </script>
</body>
</html>
